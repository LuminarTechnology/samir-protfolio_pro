<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ef0ff"/>
      <stop offset="100%" stop-color="#b38bff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#02030a"/>
  <!-- Diamond shape -->
  <polygon
    points="16,5 27,16 16,27 5,16"
    fill="none"
    stroke="url(#g)"
    stroke-width="1.8"
    filter="url(#glow)"
  />
  <!-- Inner diamond accent -->
  <polygon
    points="16,10 22,16 16,22 10,16"
    fill="url(#g)"
    opacity="0.18"
  />
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="url(#g)" opacity="0.9"/>
</svg>
